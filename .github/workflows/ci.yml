name: CI Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------------------------------------------
      # 1. [OPTIONAL] SETUP ENVIRONMENT & RUNTIMES
      # Add setup steps for your language here if needed.
      # Examples: actions/setup-node, actions/setup-python, actions/setup-go, etc.
      # -------------------------------------------------------------

      # -------------------------------------------------------------
      # 2. RUN TESTS & PIPE LOGS
      # -------------------------------------------------------------
      - name: Run Tests (Flaky Simulation)
        shell: bash
        run: |
          set -o pipefail
          if [ "$GITHUB_RUN_ATTEMPT" == "1" ]; then
            echo "Simulating a flaky network timeout on attempt 1..."
            { echo "Connecting to remote config server at 192.0.2.1..."; curl --connect-timeout 3 http://192.0.2.1/config.json; } 2>&1 | tee build_failure.log
          else
            echo "Attempt $GITHUB_RUN_ATTEMPT: Network is stable. Success!"
            { pip install -r requirements.txt && pytest; } 2>&1 | tee build_failure.log
          fi

      # -------------------------------------------------------------
      # 3. RUN AI BUILD ASSISTANT
      # Diagnoses the build log file created above on failure.
      # -------------------------------------------------------------
      - name: AI Build Assistant
        if: failure()
        uses: saimjawed254/autonomous-ci-cd-build-assistant@main
        with:
          log-file: 'build_failure.log'
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}